[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "hermes-youdotcom"
version = "0.2.0"
description = "Hermes plugin that bundles You.com MCP setup skills for web search, research, finance, and discovery"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "You.com", email = "support@you.com" }]

[project.urls]
Homepage = "https://github.com/youdotcom-oss/agent-skills"
Repository = "https://github.com/youdotcom-oss/agent-skills"

[project.entry-points."hermes_agent.plugins"]
youdotcom = "hermes_youdotcom"

[tool.hatch.build.targets.wheel.force-include]
"__init__.py" = "hermes_youdotcom/__init__.py"
"plugin.yaml" = "hermes_youdotcom/plugin.yaml"
"skills" = "hermes_youdotcom/skills"
