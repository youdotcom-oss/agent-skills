[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "youdotcom-hermes-plugin"
version = "0.0.0"
description = "Hermes Agent plugin skill for You.com MCP setup and research"
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "You.com", email = "support@you.com" }]

[project.entry-points."hermes_agent.plugins"]
youdotcom = "hermes_youdotcom"

[tool.hatch.build.targets.wheel.force-include]
"__init__.py" = "hermes_youdotcom/__init__.py"
"plugin.yaml" = "hermes_youdotcom/plugin.yaml"
"skills" = "hermes_youdotcom/skills"
